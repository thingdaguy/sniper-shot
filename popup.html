<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Google Docs Offline Agent</title>
  </head>
  <body>
    <div class="wrap">
      <input id="prompt" type="text" placeholder="Saved prompt (used by hotkeys)" />
      <input id="apiKey" type="text" placeholder="Google API key" />
      <select id="model" aria-label="Gemini model">
        <option value="gemini-2.5-flash" selected>gemini-2.5-flash</option>
        <option value="gemini-2.5-pro">gemini-2.5-pro</option>
        <option value="gemini-2.5-flash-lite">gemini-2.5-flash-lite</option>
        <option value="gemini-3.1-pro-preview">gemini-3.1-pro-preview</option>
        <option value="gemini-3-flash-preview">gemini-3-flash-preview</option>
        <option value="gemini-3.1-flash-lite-preview">gemini-3.1-flash-lite-preview</option>
      </select>
      <div class="hint">Ctrl+Shift+K sends in background. Ctrl+Shift+L toggles saved result.</div>
      <button id="save">Save</button>
      <div class="status" id="status"></div>
    </div>
    <style>
      body {
        margin: 0;
        background: #0f0f0f;
        color: #eaeaea;
        font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial;
        width: 320px;
      }
      .wrap {
        padding: 12px;
      }
      input, select {
        width: 100%;
        box-sizing: border-box;
        background: rgba(255, 255, 255, 0.06);
        color: #f3f3f3;
        border: 1px solid rgba(255, 255, 255, 0.12);
        border-radius: 10px;
        padding: 8px 9px;
        outline: none;
        font-size: 12px;
      }
      #apiKey {
        margin-top: 8px;
      }
      #model {
        margin-top: 8px;
      }
      button {
        flex: 1;
        background: rgba(255, 255, 255, 0.10);
        color: #f3f3f3;
        border: 1px solid rgba(255, 255, 255, 0.16);
        border-radius: 10px;
        padding: 8px 10px;
        font-size: 12px;
        cursor: pointer;
        width: 100%;
        margin-top: 10px;
      }
      button:disabled {
        opacity: 0.55;
        cursor: not-allowed;
      }
      .hint {
        margin-top: 8px;
        font-size: 11px;
        color: rgba(255, 255, 255, 0.62);
        line-height: 1.2;
        user-select: none;
      }
      .status {
        margin-top: 10px;
        font-size: 11px;
        color: rgba(255, 255, 255, 0.70);
        user-select: none;
      }
      option {
        color: #0f0f0f;
      }
    </style>
    <script src="popup_main.js"></script>
  </body>
</html>
